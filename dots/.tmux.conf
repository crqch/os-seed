# tmux configuration
# Managed by tmuxpanel — Tmux Plugin Panel
#
# Enable mouse
set -g mouse on

# Window numbering
set -g base-index 1

set -g prefix C-b
set -g default-shell /usr/bin/fish
# ── Plugins (managed by tmuxpanel) ──────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'jimeh/tmux-themepack'
set -g @plugin 'erikw/tmux-powerline'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
run-shell '/home/mic/.tmux/plugins/vim-tmux-navigator/vim-tmux-navigator.tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
run-shell '/home/mic/.tmux/plugins/tmux-resurrect/tmux-resurrect.tmux'
# ── End plugins ──────────────────────────────────────

set-window-option -g mode-keys vi
#set -g @themepack "powerline/default/yellow"

# ── Ferra Theme Colors ──────────────────────────────────────
# Status bar styling
set -g status-style "bg=#2b292d,fg=#f1d8a5"
set -g status-left-length 50
set -g status-left "#[bg=#f06095,fg=#2b292d,bold] #S #[bg=#3b383c,fg=#f06095]"

# Window tabs
set -g window-status-format "#[fg=#89807a,bg=#2b292d] #I:#W "
set -g window-status-current-format "#[fg=#2b292d,bg=#e05a4f,bold] #I:#W #[fg=#e05a4f,bg=#2b292d,none]"

# Pane borders
set -g pane-border-style "fg=#3b383c"
set -g pane-active-border-style "fg=#f06095"

# Message/Command line
set -g message-style "bg=#f1d8a5,fg=#2b292d,bold"

# Right side of status bar (Clock/Host)
set -g status-right "#[fg=#3b383c]#[bg=#3b383c,fg=#f1d8a5] %H:%M #[fg=#f06095]#[bg=#f06095,fg=#2b292d,bold] #H "
# ──────────────────────────────────────────────────────────

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
#bind-key -n M-h select-pane -L
#bind-key -n M-j select-pane -D
#bind-key -n M-k select-pane -U
#bind-key -n M-l select-pane -R
#
#bind-key -n M-H swap-pane -d -t '{left-of}'
#bind-key -n M-J swap-pane -d -t '{down-of}'
#bind-key -n M-K swap-pane -d -t '{up-of}'
#bind-key -n M-L swap-pane -d -t '{right-of}'
#
#bind-key -n C-M-h resize-pane -L 5
#bind-key -n C-M-j resize-pane -D 5
#bind-key -n C-M-k resize-pane -U 5
#bind-key -n C-M-l resize-pane -R 5

bind-key -n M-i select-layout even-vertical

# Force Even Horizontal Layout (Side-by-Side)
bind-key -n M-u select-layout even-horizontal
