# vim:ft=kitty

## name: Yue Fullmoon (Newmoon)
## author: Adapted from Zed Yue Theme
## license: MIT
## blurb: A dark, ethereal theme with soft purples, vibrant corals, and misty highlights.

# The basic colors
foreground              #F0D8EB
background              #0D090D
selection_foreground    #0D090D
selection_background    #F0D8EB

# Cursor colors
cursor                  #F0D8EB
cursor_text_color       #0D090D

# URL underline color when hovering with mouse
url_color               #F9A2EC

# Kitty window border colors
active_border_color     #F9A2EC
inactive_border_color   #1A1218
bell_border_color       #FF91A6

# Tab bar colors
active_tab_foreground   #0D090D
active_tab_background   #F9A2EC
inactive_tab_foreground #7A5674
inactive_tab_background #1A1218
tab_bar_background      #0D090D

# The 16 terminal colors

# black
color0 #0D090D
color8 #7A5674

# red
color1 #FF91A6
color9 #FF91A6

# green
color2  #D4FFB3
color10 #D4FFB3

# yellow
color3  #F5C94E
color11 #F5C94E

# blue (mapped to Coral/Honey for consistency with palette)
color4  #F9A2EC
color12 #F9A2EC

# magenta
color5  #F9A2EC
color13 #F9A2EC

# cyan (mapped to Mist)
color6  #F0D8EB
color14 #F0D8EB

# white
color7  #F0D8EB
color15 #F0D8EB
